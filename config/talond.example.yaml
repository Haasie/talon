# talond.example.yaml
# Copy to talond.yaml and edit for your environment.
# Canonical config shape validated by src/core/config/config-schema.ts
#
# Deployment modes:
# - Native daemon: see `deploy/talond.service`
# - Container daemon: see `deploy/docker-compose.yaml`
# - Wake-only / timer mode: see `deploy/talond.timer`

storage:
  type: sqlite
  path: data/talond.sqlite

sandbox:
  runtime: docker
  image: talon-sandbox:latest
  maxConcurrent: 3
  networkDefault: off
  idleTimeoutMs: 1800000
  hardTimeoutMs: 3600000
  resourceLimits:
    memoryMb: 1024
    cpus: 1
    pidsLimit: 256

channels:
  - type: telegram
    name: personal-telegram
    enabled: true
    config:
      token: ${TELEGRAM_BOT_TOKEN}
      allowedUserIds:
        - 123456789
      pollIntervalMs: 1000

personas:
  - name: assistant
    model: claude-sonnet-4-6
    provider: claude-code
    systemPromptFile: personas/assistant/system.md
    skills: []
    subagents:
      - session-summarizer
      - memory-groomer
      - memory-retriever
      - file-searcher
    capabilities:
      allow:
        - channel.send:telegram
        - fs.read:*
        - memory.access:*
        - subagent.invoke:*
        - subagent.background
      requireApproval:
        - fs.write:workspace
    mounts:
      - source: data/threads/{thread}/memory
        target: /memory
        mode: ro
      - source: data/threads/{thread}/artifacts
        target: /artifacts
        mode: rw
    maxConcurrent: 2

ipc:
  pollIntervalMs: 500
  daemonSocketDir: data/ipc/daemon

queue:
  maxAttempts: 3
  backoffBaseMs: 1000
  backoffMaxMs: 60000
  concurrencyLimit: 5

agentRunner:
  defaultProvider: claude-code
  providers:
    claude-code:
      enabled: true
      command: claude
      contextWindowTokens: 200000
      contextManagement:
        enabled: true
        triggerMetric: cache_read_input_tokens
        thresholdRatio: 0.5
        recentMessageCount: 10
        summarizer: session-summarizer
    gemini-cli:
      enabled: false
      command: gemini
      contextWindowTokens: 1000000
      contextManagement:
        enabled: true
        triggerMetric: input_tokens
        thresholdRatio: 0.8
        recentMessageCount: 10
        summarizer: session-summarizer
      options:
        defaultModel: gemini-2.5-pro

backgroundAgent:
  enabled: true
  maxConcurrent: 3
  defaultTimeoutMinutes: 30
  defaultProvider: claude-code
  providers:
    claude-code:
      enabled: true
      command: claude
      contextWindowTokens: 200000
    gemini-cli:
      enabled: false
      command: gemini
      contextWindowTokens: 1000000
      options:
        defaultModel: gemini-2.5-pro

scheduler:
  tickIntervalMs: 5000

auth:
  mode: subscription
  # mode: api_key
  # apiKey: ${SUBAGENT_ANTHROPIC_API_KEY}
  providers:
    anthropic:
      apiKey: ${SUBAGENT_ANTHROPIC_API_KEY}
    openai:
      apiKey: ${OPENAI_API_KEY}
      # baseURL: https://api.openai.com/v1
    # google:
    #   apiKey: ${GOOGLE_AI_API_KEY}

# Langfuse observability — traces agent runs, tool calls, and LLM generations.
# Sign up at https://cloud.langfuse.com or self-host: https://langfuse.com/docs/deployment/self-host
langfuse:
  enabled: false
  publicKey: ${LANGFUSE_PUBLIC_KEY}
  secretKey: ${LANGFUSE_SECRET_KEY}
  baseUrl: https://cloud.langfuse.com
  environment: production
  # release: v1.0.0
  # exportMode: batched           # batched (default) or immediate
  # flushAt: 20                   # spans buffered before flush
  # flushIntervalSeconds: 5       # max seconds between flushes

logLevel: info
dataDir: data
