# talond.example.yaml
# Canonical config shape validated by src/core/config/config-schema.ts
#
# Deployment modes:
# - Native daemon (systemd): see deploy/talond.service
# - Container daemon (Docker): see deploy/docker-compose.yaml
# - Wake-only / timer mode: see deploy/talond.timer and deploy/talond-wake.service

storage:
  type: sqlite
  path: data/talond.sqlite

sandbox:
  runtime: docker
  image: talon-sandbox:latest
  maxConcurrent: 3
  networkDefault: off
  idleTimeoutMs: 1800000
  hardTimeoutMs: 3600000
  resourceLimits:
    memoryMb: 1024
    cpus: 1
    pidsLimit: 256

channels:
  - type: telegram
    name: personal-telegram
    enabled: true
    config:
      token: ${TELEGRAM_BOT_TOKEN}
      allowedUserIds:
        - 123456789
      pollIntervalMs: 1000

personas:
  - name: assistant
    model: claude-sonnet-4-6
    systemPromptFile: personas/assistant/system.md
    skills: []
    capabilities:
      allow:
        - channel.send:telegram
        - fs.read:workspace
      requireApproval:
        - fs.write:workspace
    mounts:
      - source: data/threads/{thread}/memory
        target: /memory
        mode: ro
      - source: data/threads/{thread}/artifacts
        target: /artifacts
        mode: rw

schedules: []

ipc:
  pollIntervalMs: 500
  daemonSocketDir: data/ipc/daemon

queue:
  maxAttempts: 3
  backoffBaseMs: 1000
  backoffMaxMs: 60000
  concurrencyLimit: 5

scheduler:
  tickIntervalMs: 5000

auth:
  mode: subscription
  # mode: api_key
  # apiKey: ${ANTHROPIC_API_KEY}

logLevel: info
dataDir: data
